{{- if .Values.namespaces.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.cloud }}
  labels:
    tier: cloud
    {{- include "eo.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespaces.edge }}
  labels:
    tier: edge
    {{- include "eo.labels" . | nindent 4 }}
{{- end }}
